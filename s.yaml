# 阿里云FC标准s.yaml模板（Serverless Devs规范）
edition: 1.0.0
name: Scan_resume
access: default 

services:
  fc-service: 
    component: devsapp/fc 
    props:
      region: cn-hangzhou # 替换为你的地域，如cn-beijing、cn-shanghai
      service:
        name: Scan_resume
        description: 扫描简历
      function:
        name: scan-resume-function
        runtime: python3.9
        handler: main.handler
        codeUri: ./ 
        memorySize: 512 # 内存大小
        timeout: 30 # 超时时间(秒)